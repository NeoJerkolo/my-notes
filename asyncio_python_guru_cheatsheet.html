<span class="kw">async def</span> <span class="fn">fetch_data</span>(url: str) -> str:

<span class="kw">async def</span> <span class="fn">step2</span>():

function renderCode(html) {
  return `<div class="code-block">${html}</div>`;
}

function renderCard(card) {
  let html = `<div class="card">`;
  html += `<div class="card-title">${card.title}</div>`;
  if (card.desc) html += `<div class="card-desc">${card.desc}</div>`;

  if (card.tags) {
    const colors = ['tag-purple','tag-teal','tag-blue','tag-amber','tag-coral','tag-green'];
    html += `<div style="margin-bottom:0.75rem">` + card.tags.map((t,i) => `<span class="tag ${colors[i%colors.length]}">${t}</span>`).join('') + `</div>`;
  }
  if (card.code) html += renderCode(card.code);
  if (card.warn) html += `<div class="warn-box">⚠ ${card.warn}</div>`;
  if (card.tip) html += `<div class="tip-box">✓ ${card.tip}</div>`;
  if (card.danger) html += `<div class="danger-box">✕ ${card.danger}</div>`;

  if (card.table) {
    html += `<table class="table"><thead><tr>`;
    card.table.cols.forEach(c => html += `<th>${c}</th>`);
    html += `</tr></thead><tbody>`;
    card.table.rows.forEach(row => {
      html += `<tr>`;
      row.forEach(cell => html += `<td>${cell}</td>`);
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  }

  if (card.antipatterns) {
    html += `<table class="table"><thead><tr><th>Не роби</th><th>Роби так</th><th>Чому</th></tr></thead><tbody>`;
    card.antipatterns.forEach(ap => {
      html += `<tr>
        <td><code style="color:var(--red600);background:var(--red50)">${ap.bad}</code></td>
        <td><code style="color:var(--teal600);background:var(--teal50)">${ap.good}</code></td>
        <td style="color:var(--c-muted);font-size:12px">${ap.why}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  html += `</div>`;
  return html;
}

const badgeColorMap = {
  purple: 'tag-purple', teal: 'tag-teal', amber: 'tag-amber', blue: 'tag-blue',
  coral: 'tag-coral', green: 'tag-green', red: 'tag-red', gray: 'tag-gray'
};

function renderSection(sec) {
  let html = `<div class="section-header">`;
  html += `<span style="font-size:18px;font-weight:500">${sec.label}</span>`;
  html += `<span class="tag ${badgeColorMap[sec.badgeColor]||'tag-gray'}">${sec.badge}</span>`;
  html += `</div>`;
  html += `<div class="grid2">`;
  sec.cards.forEach(c => html += renderCard(c));
  html += `</div>`;
  const topic = sec.label.replace(/^\d+\.\s*/, '');
  html += `<button class="ask-btn" onclick="sendPrompt('Поясни детальніше: ${topic} в asyncio Python 3.9')">Запитати про ${topic} ↗</button>`;
  return html;
}

const nav = document.getElementById('nav');
const content = document.getElementById('content');

sections.forEach((sec, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
  btn.textContent = sec.label;
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-' + sec.id).classList.add('active');
  };
  nav.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'section' + (i === 0 ? ' active' : '');
  div.id = 'sec-' + sec.id;
  div.innerHTML = renderSection(sec);
  content.appendChild(div);
});
</script>
