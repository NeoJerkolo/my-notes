{

b = -7

print(a is b)    # False (різні об'єкти)`,

},
{

nan = float('nan')

# Класична пастка

{

  code:`print(type(True))    # <class 'bool'>
print(isinstance(True, int))  # True!
print(True + True)   # 2
print(True * 5)      # 5
print(True is True)  # True (singleton!)

# Falsy значення
bool(0), bool(''), bool([]), bool(None)  # всі False
bool(1), bool('a'), bool([1])            # всі True

# Порівняння
print(True == 1)     # True
print(True is 1)     # False (різні типи!)`,
  ops:[['bool(x)', 'O(1)'],['and / or', 'O(1)'],['not', 'O(1)'],['all()/any()', 'O(n)']],

  fact:`Чому bool наслідує int? Історична причина: у Python 2 не було bool взагалі, використовували 0/1. Python 2.2 додав bool як підклас int для зворотної сумісності.`
},
{
  id:'str', badge:'badge-str', label:'str', title:'String', subtitle:'immutable, Unicode', category:'рядки',
  desc:'Рядки — незмінні послідовності Unicode символів (UTF-32 під капотом). Підтримують усі мови світу.',
  underHood:`CPython використовує "compact strings" — 3 внутрішні формати: Latin-1 (1 байт/символ для ASCII), UCS-2 (2 байти, BMP), UCS-4 (4 байти, всі Unicode). Формат обирається автоматично на основі символів у рядку.`,
  code:`s = "Привіт"
s2 = 'Hello'
multi = """
рядок
кілька ліній
"""
raw = r"C:\\Users\\no_escape"  # raw string

# f-рядки (Python 3.6+) — найшвидший спосіб
name = "Вася"
age = 25
print(f"{name} має {age} років")  # Вася має 25 років
print(f"{2**10 = }")              # 2**10 = 1024

# Незмінність
s = "hello"
# s[0] = 'H'  → TypeError!
s = s.replace('h', 'H')  # створює новий рядок

# Інтернінг (interning)
a = "hello"
b = "hello"
print(a is b)  # True (CPython інтернує короткі рядки)`,
  ops:[['s[i]', 'O(1)'],['len(s)', 'O(1)'],['s + t', 'O(n+m)'],['s in t', 'O(n*m)'],['s.split()', 'O(n)'],['s.join()', 'O(n)']],
  methods:['upper/lower/title()', 'strip/lstrip/rstrip()', 'split/rsplit(sep)', 'join(iterable)', 'replace(old, new)', 'find/index(sub)', 'startswith/endswith()', 'format/format_map()', 'encode(encoding)', 'count(sub)', 'zfill/center/ljust/rjust()'],
  fact:`"".join(list) швидше ніж s += "..." у циклі! Причина: += створює новий рядок кожного разу O(n²). join() спочатку рахує загальний розмір, потім виділяє пам'ять один раз — O(n).`
},
{
  id:'list', badge:'badge-list', label:'list', title:'List', subtitle:'dynamic array', category:'колекції',
  desc:'Динамічний масив. Найуніварсальніша колекція Python — впорядкована, змінна, гетерогенна.',
  underHood:`Це масив покажчиків (array of pointers) на Python об'єкти. При переповненні — realloc з overallocation (~1.125x). Тому append() амортизовано O(1). Пам'ять: 56 байт (порожній) + 8 байт на елемент (покажчик).`,
  code:`lst = [1, 'два', 3.0, [4, 5]]
lst.append(6)        # O(1) amorized
lst.insert(0, 0)     # O(n) — зсуває всі!
lst.pop()            # O(1) — з кінця
lst.pop(0)           # O(n) — з початку

# List comprehension — швидше ніж цикл
squares = [x**2 for x in range(10)]
evens = [x for x in range(20) if x % 2 == 0]

# Slice — завжди копія!
a = [1, 2, 3, 4, 5]
b = a[1:3]    # [2, 3] — новий список
c = a[:]      # повна копія

# Сортування
a.sort()           # in-place, O(n log n), Timsort
b = sorted(a)      # новий список
a.sort(key=lambda x: -x)  # зворотній порядок`,
  ops:[['append(x)', 'O(1)*'],['pop()', 'O(1)'],['pop(i)', 'O(n)'],['insert(i,x)', 'O(n)'],['x in lst', 'O(n)'],['lst[i]', 'O(1)'],['sort()', 'O(n log n)'],['reverse()', 'O(n)']],
  opsNote:'* amortized — іноді O(n) при reallocate',
  methods:['append(x)', 'extend(iterable)', 'insert(i, x)', 'remove(x)', 'pop([i])', 'index(x)', 'count(x)', 'sort(key, reverse)', 'reverse()', 'copy()', 'clear()'],
  fact:`Python використовує Timsort для sort() — гібрид merge sort + insertion sort. Ідеальний для реальних даних (вже частково відсортованих). Стабільний: рівні елементи зберігають порядок.`
},
{
  id:'tuple', badge:'badge-tuple', label:'tuple', title:'Tuple', subtitle:'immutable sequence', category:'колекції',

  underHood:`Без overallocation — точний розмір у пам'яті. Кортежі 0-20 елементів кешуються CPython (free list). Незмінність ≠ хешованість: якщо в кортежі є list — він не хешований.`,
  code:`t = (1, 2, 3)
t2 = 1, 2, 3        # теж кортеж!
single = (1,)       # кома обов'язкова!

# Unpacking
x, y, z = t
first, *rest = (1, 2, 3, 4, 5)
# first=1, rest=[2,3,4,5]

# Named tuple

Point = namedtuple('Point', ['x', 'y'])
p = Point(3, 4)
print(p.x, p.y)  # 3 4

# Tuple vs List швидкість
import timeit
# tuple literal ~2x швидше list literal
# індексування tuple трохи швидше

# Як ключ словника
d = {(1, 2): 'точка A', (3, 4): 'точка B'}`,
  ops:[['t[i]', 'O(1)'],['len(t)', 'O(1)'],['x in t', 'O(n)'],['t + t2', 'O(n+m)'],['count(x)', 'O(n)'],['index(x)', 'O(n)']],
  methods:['count(x)', 'index(x)', 'len(t)', '_make()', '_asdict()', '_replace()'],

},
{
  id:'dict', badge:'badge-dict', label:'dict', title:'Dictionary', subtitle:'hash table, впорядкований з 3.7', category:'колекції',
  desc:'Хеш-таблиця. З Python 3.7 — гарантовано зберігає порядок вставки. Найшвидший пошук серед колекцій.',
  underHood:`Compact hash table (Python 3.6+). Зберігає indices array (малий) + entries array (ключ, значення, хеш). Load factor ~2/3. При колізії — open addressing з quadratic probing. Rehash при переповненні.`,
  code:`d = {'a': 1, 'b': 2}
d['c'] = 3           # O(1) avg
d.get('x', 0)        # безпечно, не KeyError
d.setdefault('d', []).append(1)

# Dict comprehension
squares = {x: x**2 for x in range(5)}

# Злиття (Python 3.9+)

b = {'y': 2}
c = a | b    # {'x': 1, 'y': 2}

# Ітерація

a - b   # difference   {1, 2}

let activeTab = 'all';
let searchQuery = '';

function render() {
  const container = document.getElementById('cards-container');
  let filtered = TYPES.filter(t => {
    const matchTab = activeTab === 'all' || t.category === activeTab;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || t.id.includes(q) || t.title.toLowerCase().includes(q) || t.label.toLowerCase().includes(q) || (t.methods && t.methods.some(m => m.toLowerCase().includes(q)));
    return matchTab && matchSearch;
  });
  container.innerHTML = filtered.map(t => renderCard(t)).join('');
  filtered.forEach(t => {
    const card = document.getElementById('card-' + t.id);
    if (card) card.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') return;
      const body = document.getElementById('body-' + t.id);
      const chev = document.getElementById('chev-' + t.id);
      if (body) body.classList.toggle('hidden');
      if (chev) chev.classList.toggle('open');
    });
  });
}

function renderCard(t) {
  const opsHtml = t.ops ? `<div class="sub-title">Складність операцій</div><div class="complexity-grid">${t.ops.map(([op, big]) => {
    let cls = big.includes('1)') ? 'o1' : big.includes('log') ? 'ologn' : big.includes('n²') || big.includes('n*m') ? 'on2' : 'on';
    return `<div class="op-row"><span class="op-name">${op}</span><span class="op-big ${cls}">${big}</span></div>`;
  }).join('')}</div>${t.opsNote ? `<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px;">${t.opsNote}</div>` : ''}` : '';
  const methodsHtml = t.methods ? `<div class="sub-title">Методи</div><div class="methods-grid">${t.methods.map(m => `<span class="method-tag">${m}</span>`).join('')}</div>` : '';
  const factHtml = t.fact ? `<div class="fun-fact"><strong>Цікаво:</strong> ${t.fact}</div>` : '';
  return `<div class="card" id="card-${t.id}" style="cursor:pointer;">
    <div class="card-header">
      <span class="type-badge ${t.badge}">${t.label}</span>
      <span class="card-title">${t.title}</span>
      <span class="card-subtitle">${t.subtitle}</span>
      <span class="chevron" id="chev-${t.id}">&#9654;</span>
    </div>
    <div class="card-body hidden" id="body-${t.id}">
      <div>${t.desc}</div>
      <div class="sub"><div class="sub-title">Під капотом</div><div style="font-size:12px;line-height:1.7;color:var(--color-text-secondary);">${t.underHood}</div></div>
      <div class="sub"><div class="sub-title">Приклади коду</div><pre>${t.code}</pre></div>
      ${opsHtml}
      ${methodsHtml}
      ${factHtml}
    </div>
  </div>`;
}

function filterTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterCards() {
  searchQuery = document.getElementById('search').value;
  render();
}

render();
</script>
