<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>JS Router</title>
</head>
<body>
    <nav>
        <a href="#doc1" onclick="route('pages/python_datatypes_cheatsheet.html')">python_datatypes_cheatsheet </a> |
        <a href="#doc1" onclick="route('pages/oop_python_guru_cheatsheet.html')">oop_python_guru_cheatsheet </a> |
        <a href="#doc2" onclick="route('pages/python_cheatsheet.html')">python_cheatsheet 2</a>
    </nav>

    <div id="content">
        <h2>Вітаю! Оберіть документ вище.</h2>
    </div>

    <script>
        async function route(url) {
            const response = await fetch(url);
            const html = await response.text();
            document.getElementById('content').innerHTML = html;
        }

        // Обробка навігації при завантаженні сторінки за хешем (напр. index.html#doc1)
        window.addEventListener('hashchange', () => {
            // Тут можна додати логіку співставлення хешу з файлом
        });
    </script>
</body>
</html>
